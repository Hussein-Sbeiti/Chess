name: Build Chess Studio for Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**"
  release:
    types: [published]

jobs:
  build-windows:
    name: Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install build dependencies
        run: py -3 -m pip install -r requirements-build.txt

      - name: Build executable
        run: py -3 -m PyInstaller --clean --noconfirm ChessStudio.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChessStudio-Windows
          path: dist/ChessStudio.exe

      - name: Attach executable to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ChessStudio.exe
